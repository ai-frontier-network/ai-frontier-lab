name: AI Article Generator

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch: 

concurrency:
  group: ai-news-generator
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonのセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージのインストール
        run: pip install google-genai pydantic

      # 🔴 改善⑥：事故防止のためのバックアップ
      - name: ファイルの事前バックアップ
        run: |
          cp index.html backup-index.html || true
          cp archive.html backup-archive.html || true

      - name: 記事の自動生成
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  
          GEMINI_MODEL: "gemini-2.0-flash" 
        run: python generate.py

      # 🔴 改善⑥：ビルドが壊れていないか、主要ファイルの存在と整合性を自動検証するスモークテスト
      - name: 生成ファイルの自動検証（スモークテスト）
        run: |
          test -f index.html || { echo "Error: index.html missing"; exit 1; }
          test -f archive.html || { echo "Error: archive.html missing"; exit 1; }
          test -f style.css || { echo "Error: style.css missing"; exit 1; }
          [ -s index.html ] || { echo "Error: index.html is empty"; exit 1; }
          [ -s archive.html ] || { echo "Error: archive.html is empty"; exit 1; }
          echo "Smoke test passed successfully! 🎉"

      - name: 生成されたファイルを自動コミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ data/ index.html archive.html logs/history.json
          git diff --staged --quiet || git commit -m "🤖 Auto: AIニュースを全自動更新（ローテーション対応） [skip ci]"  
          git push

      - name: ログをアーティファクトとして保存
        if: always()  
        uses: actions/upload-artifact@v4
        with:
          name: app-log-${{ github.run_id }}
          path: logs/app.log
          retention-days: 30
